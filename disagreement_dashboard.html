<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Disagreement Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1a1a26;
    --bg-card: #14141e;
    --bull: #00e676;
    --bear: #ff5252;
    --gold: #ffd740;
    --blue: #448aff;
    --text-primary: #e8e8f0;
    --text-secondary: #8888a0;
    --text-muted: #555570;
    --border: #2a2a3a;
    --border-light: #3a3a4a;
  }

  body {
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.5;
  }

  .container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

  /* Header */
  .header { text-align: center; padding: 32px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 3px; color: var(--text-primary); }
  .header .subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 6px; max-width: 700px; margin-left: auto; margin-right: auto; }
  .header-meta { display: flex; justify-content: center; align-items: center; gap: 16px; margin-top: 12px; font-size: 11px; color: var(--text-muted); }
  .refresh-btn {
    background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-secondary);
    padding: 4px 12px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 11px;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--blue); color: var(--blue); }

  /* Stats Bar */
  .stats-bar { display: flex; justify-content: center; gap: 12px; padding: 16px 0; flex-wrap: wrap; }
  .stat-chip {
    background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 16px; font-size: 12px; display: flex; align-items: center; gap: 8px;
  }
  .stat-chip .stat-val { font-weight: 700; font-size: 16px; }
  .stat-chip .stat-label { color: var(--text-secondary); font-size: 11px; }
  .stat-chip.bull .stat-val { color: var(--bull); }
  .stat-chip.bear .stat-val { color: var(--bear); }
  .stat-chip.gold .stat-val { color: var(--gold); }

  /* Filter Bar */
  .filter-bar {
    display: flex; align-items: center; gap: 12px; padding: 14px 0;
    border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .filter-group { display: flex; align-items: center; gap: 4px; }
  .filter-group label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-right: 4px; }
  .filter-btn {
    background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-secondary);
    padding: 5px 10px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 11px;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--text-secondary); }
  .filter-btn.active { background: var(--bg-tertiary); border-color: var(--blue); color: var(--text-primary); }
  .filter-btn.active.bull-active { border-color: var(--bull); color: var(--bull); }
  .filter-btn.active.bear-active { border-color: var(--bear); color: var(--bear); }

  .search-input {
    background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-primary);
    padding: 5px 10px; border-radius: 4px; font-family: inherit; font-size: 11px; width: 120px;
    outline: none; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--blue); }
  .search-input::placeholder { color: var(--text-muted); }

  .filter-spacer { flex: 1; }

  .view-toggle { display: flex; gap: 2px; background: var(--bg-secondary); border-radius: 4px; padding: 2px; }
  .view-btn {
    background: none; border: none; color: var(--text-muted); padding: 4px 10px;
    border-radius: 3px; cursor: pointer; font-family: inherit; font-size: 11px; transition: all 0.15s;
  }
  .view-btn.active { background: var(--bg-tertiary); color: var(--text-primary); }

  /* Section headers */
  .section-header {
    display: flex; align-items: center; gap: 10px; padding: 20px 0 12px;
    font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
  }
  .section-header .count-badge {
    background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 10px;
    padding: 2px 10px; font-size: 11px; color: var(--text-secondary); font-weight: 400;
  }

  /* Card Grid */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 16px; }

  .card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    border-left: 3px solid var(--border); overflow: hidden; transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--border-light); }
  .card.bull { border-left-color: var(--bull); }
  .card.bear { border-left-color: var(--bear); }

  .card-top {
    display: flex; align-items: center; gap: 10px; padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .card-ticker { font-size: 18px; font-weight: 700; }
  .card-ticker .core-star { color: var(--gold); margin-left: 4px; font-size: 14px; }
  .card-price-date { font-size: 11px; color: var(--text-secondary); margin-left: auto; text-align: right; }
  .card-price-date .price { font-size: 13px; color: var(--text-primary); font-weight: 500; }

  .dir-badge, .grade-badge {
    padding: 3px 8px; border-radius: 3px; font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
  }
  .dir-badge.bull { background: rgba(0,230,118,0.12); color: var(--bull); }
  .dir-badge.bear { background: rgba(255,82,82,0.12); color: var(--bear); }
  .grade-badge.a { background: rgba(0,230,118,0.12); color: var(--bull); }
  .grade-badge.b { background: rgba(255,215,64,0.12); color: var(--gold); }
  .grade-badge.c { background: rgba(255,82,82,0.12); color: var(--bear); }

  /* Weeks swept hero */
  .swept-hero { padding: 14px 16px; text-align: center; border-bottom: 1px solid var(--border); }
  .swept-number { font-size: 36px; font-weight: 700; line-height: 1; }
  .swept-number.gold { color: var(--gold); }
  .swept-label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .swept-dots { margin-top: 8px; display: flex; justify-content: center; gap: 6px; }
  .swept-dot { width: 10px; height: 10px; border-radius: 50%; }
  .swept-dot.bull { background: var(--bull); }
  .swept-dot.bear { background: var(--bear); }

  .swept-detail { font-size: 10px; color: var(--text-muted); margin-top: 8px; line-height: 1.6; }

  /* Info grid */
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }
  .info-cell { background: var(--bg-card); padding: 8px 16px; }
  .info-cell .info-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .info-cell .info-val { font-size: 13px; font-weight: 500; margin-top: 2px; }

  /* Checklist */
  .checklist { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 16px; border-top: 1px solid var(--border); }
  .check-item { font-size: 10px; color: var(--text-muted); }
  .check-item.pass { color: var(--bull); }
  .check-item.fail { color: var(--text-muted); }

  /* DOL box */
  .dol-box {
    margin: 0 16px 12px; padding: 10px 12px; background: var(--bg-primary); border-radius: 4px;
    border: 1px solid var(--border); font-size: 11px; line-height: 1.6;
  }
  .dol-box .dol-highlight { color: var(--gold); font-weight: 600; }

  /* Score bar */
  .score-bar-container { padding: 8px 16px 14px; }
  .score-bar-label { font-size: 10px; color: var(--text-secondary); margin-bottom: 4px; display: flex; justify-content: space-between; }
  .score-bar { height: 4px; background: var(--bg-tertiary); border-radius: 2px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .score-bar-fill.a { background: var(--bull); }
  .score-bar-fill.b { background: var(--gold); }
  .score-bar-fill.c { background: var(--bear); }

  /* Table view */
  .table-container { overflow-x: auto; }
  table.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.data-table th {
    text-align: left; padding: 10px 12px; border-bottom: 2px solid var(--border);
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted);
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  table.data-table th:hover { color: var(--text-secondary); }
  table.data-table th .sort-arrow { margin-left: 4px; font-size: 9px; }
  table.data-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  table.data-table tr:hover { background: var(--bg-secondary); }
  table.data-table .ticker-cell { font-weight: 600; }
  table.data-table .ticker-cell .core-star { color: var(--gold); margin-left: 3px; font-size: 10px; }

  /* Empty state */
  .empty-state { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }

  /* Loading */
  .loading { text-align: center; padding: 60px; color: var(--text-secondary); font-size: 14px; }
  .loading .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 10px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Responsive */
  @media (max-width: 500px) {
    .card-grid { grid-template-columns: 1fr; }
    .filter-bar { gap: 8px; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>WEEKLY DISAGREEMENT SCANNER</h1>
    <div class="subtitle">Finds weekly candles that sweep 2+ consecutive weeks of liquidity then close back inside the prior week's range — the quantitative fingerprint of a DOL reversal.</div>
    <div class="header-meta">
      <span id="scanTime">--</span>
      <button class="refresh-btn" onclick="loadData()">Refresh</button>
    </div>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>Dir</label>
      <button class="filter-btn active" data-filter="direction" data-value="all">All</button>
      <button class="filter-btn" data-filter="direction" data-value="BULLISH">Bull</button>
      <button class="filter-btn" data-filter="direction" data-value="BEARISH">Bear</button>
    </div>
    <div class="filter-group">
      <label>Grade</label>
      <button class="filter-btn active" data-filter="grade" data-value="all">All</button>
      <button class="filter-btn" data-filter="grade" data-value="A">A</button>
      <button class="filter-btn" data-filter="grade" data-value="B">B</button>
    </div>
    <div class="filter-group">
      <label>Min Swept</label>
      <button class="filter-btn active" data-filter="swept" data-value="2">2+</button>
      <button class="filter-btn" data-filter="swept" data-value="3">3+</button>
      <button class="filter-btn" data-filter="swept" data-value="4">4+</button>
    </div>
    <div class="filter-group">
      <button class="filter-btn" id="coreToggle" data-filter="core" data-value="off">Core Only</button>
    </div>
    <input type="text" class="search-input" id="searchInput" placeholder="Search ticker...">
    <div class="filter-spacer"></div>
    <div class="view-toggle">
      <button class="view-btn active" data-view="cards">Cards</button>
      <button class="view-btn" data-view="table">Table</button>
    </div>
  </div>

  <!-- Content -->
  <div id="content">
    <div class="loading"><span class="spinner"></span>Loading data...</div>
  </div>
</div>

<script>
const CORE = new Set(["SPY","XOM","UPS","RIVN","NVDA","AMD","AAPL","HOOD","AVGO","SOFI","AFRM","MCD","BE","DIS","CROX"]);

let DATA = null;
let filters = { direction: "all", grade: "all", swept: 2, core: false, search: "" };
let viewMode = "cards";
let sortCol = "score";
let sortDir = "desc";

// ---- Data loading ----
async function loadData() {
  try {
    const resp = await fetch("/api/data");
    if (resp.ok) { DATA = await resp.json(); render(); return; }
  } catch (e) {}
  try {
    const resp = await fetch("disagreement_data.json");
    if (resp.ok) { DATA = await resp.json(); render(); return; }
  } catch (e) {}
  document.getElementById("content").innerHTML = '<div class="empty-state">No data found. Run the scanner first:<br><code style="color:var(--blue)">python3 weekly_disagreement_scanner.py</code></div>';
}

// ---- Filtering ----
function applyFilters(signals) {
  return signals.filter(s => {
    if (filters.direction !== "all" && s.direction !== filters.direction) return false;
    if (filters.grade !== "all" && s.grade !== filters.grade) return false;
    if (s.weeks_swept < filters.swept) return false;
    if (filters.core && !CORE.has(s.ticker)) return false;
    if (filters.search && !s.ticker.toLowerCase().includes(filters.search.toLowerCase())) return false;
    return true;
  });
}

// ---- Sorting (table) ----
function sortSignals(signals) {
  const key = sortCol;
  return [...signals].sort((a, b) => {
    let va = a[key], vb = b[key];
    if (typeof va === "string") { va = va.toLowerCase(); vb = (vb||"").toLowerCase(); }
    if (va < vb) return sortDir === "asc" ? -1 : 1;
    if (va > vb) return sortDir === "asc" ? 1 : -1;
    return 0;
  });
}

// ---- Render ----
function render() {
  if (!DATA) return;
  document.getElementById("scanTime").textContent = `Scan: ${DATA.scan_time}`;

  // Stats
  const s = DATA.summary;
  const totalActive = (DATA.active_setups || []).length;
  document.getElementById("statsBar").innerHTML = `
    <div class="stat-chip"><span class="stat-val">${totalActive}</span><span class="stat-label">Active</span></div>
    <div class="stat-chip bull"><span class="stat-val">${s.active_bullish}</span><span class="stat-label">Bullish</span></div>
    <div class="stat-chip bear"><span class="stat-val">${s.active_bearish}</span><span class="stat-label">Bearish</span></div>
    <div class="stat-chip gold"><span class="stat-val">${s.a_grade_active}</span><span class="stat-label">A-Grade</span></div>
    <div class="stat-chip"><span class="stat-val">${DATA.tickers_scanned}</span><span class="stat-label">Scanned</span></div>
  `;

  const activeFiltered = applyFilters(DATA.active_setups || []);
  const histFiltered = applyFilters(DATA.historical_signals || []);

  let html = "";

  // Active section
  html += `<div class="section-header">Active &mdash; This Week <span class="count-badge">${activeFiltered.length}</span></div>`;
  if (activeFiltered.length === 0) {
    html += '<div class="empty-state">No active setups match filters</div>';
  } else {
    html += viewMode === "cards" ? renderCards(activeFiltered) : renderTable(activeFiltered);
  }

  // Historical section
  html += `<div class="section-header">Historical <span class="count-badge">${histFiltered.length}</span></div>`;
  if (histFiltered.length === 0) {
    html += '<div class="empty-state">No historical signals match filters</div>';
  } else {
    html += viewMode === "cards" ? renderCards(histFiltered) : renderTable(histFiltered);
  }

  document.getElementById("content").innerHTML = html;
}

function isCore(ticker) { return CORE.has(ticker); }
function fmt(n) { return n != null ? "$" + Number(n).toFixed(2) : "--"; }

function renderCards(signals) {
  const sorted = sortSignals(signals);
  return `<div class="card-grid">${sorted.map(cardHTML).join("")}</div>`;
}

function cardHTML(s) {
  const isBull = s.direction === "BULLISH";
  const dir = isBull ? "bull" : "bear";
  const gradeClass = s.grade.toLowerCase();
  const coreStar = isCore(s.ticker) ? '<span class="core-star">&#9733;</span>' : '';
  const sweptCount = s.weeks_swept;
  const sweptGold = sweptCount >= 3 ? " gold" : "";

  // Swept detail
  const sweptItems = isBull ? (s.swept_lows || []) : (s.swept_highs || []);
  const sweptDetail = sweptItems.map(w => {
    const lvl = isBull ? fmt(w.low) : fmt(w.high);
    return `Wk ${w.week}: ${lvl}`;
  }).join(" | ");

  const sweptLabel = isBull ? `weeks of lows swept` : `weeks of highs swept`;

  // Info grid
  const sweptLevel = fmt(s.swept_level);
  const depthPct = s.sweep_depth_pct + "%";
  const closePct = isBull ? (s.close_vs_pwl_pct + "%") : (s.close_vs_pwh_pct + "%");
  const closePctColor = isBull ? "color:var(--bull)" : "color:var(--bear)";
  const pwRange = fmt(s.pw_low) + " &ndash; " + fmt(s.pw_high);

  // Checklist
  const checks = [];
  checks.push({ label: "Swept 2+wk", pass: sweptCount >= 2 });
  checks.push({ label: "Closed in PW", pass: true }); // always true if signal exists
  if (isBull) {
    checks.push({ label: "Bull Candle", pass: s.bullish_candle });
    checks.push({ label: "Above PW Body", pass: s.closed_above_pw_body });
    checks.push({ label: "In Discount", pass: s.in_discount });
  } else {
    checks.push({ label: "Bear Candle", pass: s.bearish_candle });
    checks.push({ label: "Below PW Body", pass: s.closed_below_pw_body });
    checks.push({ label: "In Premium", pass: s.in_premium });
  }
  const checkHTML = checks.map(c =>
    `<span class="check-item ${c.pass ? 'pass' : 'fail'}">${c.pass ? '&#10003;' : '&#9675;'} ${c.label}</span>`
  ).join(" ");

  // DOL box
  const targets = s.dol_targets || {};
  let dolText, dolTargets;
  if (isBull) {
    dolText = `DOL: Swept PWL ${sweptLevel} (${sweptCount}wk); disagreed; DOL = buy-side.`;
    dolTargets = `Targets: PW CE: <span class="dol-highlight">${fmt(targets.pw_ce)}</span>, PWH: <span class="dol-highlight">${fmt(targets.pwh)}</span>, MONTHLY CE: <span class="dol-highlight">${fmt(targets.monthly_ce)}</span>`;
  } else {
    dolText = `DOL: Swept PWH ${sweptLevel} (${sweptCount}wk); disagreed; DOL = sell-side.`;
    dolTargets = `Targets: PW CE: <span class="dol-highlight">${fmt(targets.pw_ce)}</span>, PWL: <span class="dol-highlight">${fmt(targets.pwl)}</span>, MONTHLY CE: <span class="dol-highlight">${fmt(targets.monthly_ce)}</span>`;
  }

  // Score
  const scoreWidth = Math.min(s.score, 100);
  const scoreGrade = s.score >= 60 ? "a" : (s.score >= 40 ? "b" : "c");

  return `
  <div class="card ${dir}">
    <div class="card-top">
      <span class="card-ticker">${s.ticker}${coreStar}</span>
      <span class="dir-badge ${dir}">${s.direction}</span>
      <span class="grade-badge ${gradeClass}">${s.grade}</span>
      <div class="card-price-date">
        <div class="price">${fmt(s.price)}</div>
        <div>${s.date}</div>
      </div>
    </div>
    <div class="swept-hero">
      <div class="swept-number${sweptGold}">${sweptCount}</div>
      <div class="swept-label">${sweptLabel}</div>
      <div class="swept-dots">${Array(sweptCount).fill(`<span class="swept-dot ${dir}"></span>`).join("")}</div>
      <div class="swept-detail">${sweptDetail}</div>
    </div>
    <div class="info-grid">
      <div class="info-cell"><div class="info-label">Swept Level</div><div class="info-val">${sweptLevel}</div></div>
      <div class="info-cell"><div class="info-label">Sweep Depth</div><div class="info-val">${depthPct}</div></div>
      <div class="info-cell"><div class="info-label">Close Strength</div><div class="info-val" style="${closePctColor}">${closePct}</div></div>
      <div class="info-cell"><div class="info-label">PW Range</div><div class="info-val">${pwRange}</div></div>
    </div>
    <div class="checklist">${checkHTML}</div>
    <div class="dol-box">${dolText}<br>${dolTargets}</div>
    <div class="score-bar-container">
      <div class="score-bar-label"><span>Score</span><span>${s.score}/100</span></div>
      <div class="score-bar"><div class="score-bar-fill ${scoreGrade}" style="width:${scoreWidth}%"></div></div>
    </div>
  </div>`;
}

function renderTable(signals) {
  const sorted = sortSignals(signals);
  const cols = [
    { key: "ticker", label: "Ticker" },
    { key: "direction", label: "Dir" },
    { key: "grade", label: "Grade" },
    { key: "weeks_swept", label: "Wks Swept" },
    { key: "score", label: "Score" },
    { key: "price", label: "Price" },
    { key: "swept_level", label: "Swept Level" },
    { key: "sweep_depth_pct", label: "Depth%" },
    { key: "date", label: "Date" },
  ];
  let html = '<div class="table-container"><table class="data-table"><thead><tr>';
  for (const col of cols) {
    const arrow = sortCol === col.key ? (sortDir === "asc" ? " &#9650;" : " &#9660;") : "";
    html += `<th onclick="toggleSort('${col.key}')">${col.label}<span class="sort-arrow">${arrow}</span></th>`;
  }
  html += "</tr></thead><tbody>";
  for (const s of sorted) {
    const coreStar = isCore(s.ticker) ? '<span class="core-star">&#9733;</span>' : '';
    const dirColor = s.direction === "BULLISH" ? "color:var(--bull)" : "color:var(--bear)";
    const gradeColor = s.grade === "A" ? "color:var(--bull)" : (s.grade === "B" ? "color:var(--gold)" : "color:var(--bear)");
    html += `<tr>
      <td class="ticker-cell">${s.ticker}${coreStar}</td>
      <td style="${dirColor}">${s.direction === "BULLISH" ? "BULL" : "BEAR"}</td>
      <td style="${gradeColor};font-weight:600">${s.grade}</td>
      <td style="font-weight:700">${s.weeks_swept}</td>
      <td>${s.score}</td>
      <td>${fmt(s.price)}</td>
      <td>${fmt(s.swept_level)}</td>
      <td>${s.sweep_depth_pct}%</td>
      <td>${s.date}</td>
    </tr>`;
  }
  html += "</tbody></table></div>";
  return html;
}

function toggleSort(col) {
  if (sortCol === col) { sortDir = sortDir === "asc" ? "desc" : "asc"; }
  else { sortCol = col; sortDir = "desc"; }
  render();
}

// ---- Filter event handlers ----
document.querySelectorAll(".filter-btn[data-filter]").forEach(btn => {
  btn.addEventListener("click", () => {
    const filter = btn.dataset.filter;
    const value = btn.dataset.value;

    if (filter === "core") {
      filters.core = !filters.core;
      btn.classList.toggle("active", filters.core);
    } else {
      // Radio behavior
      document.querySelectorAll(`.filter-btn[data-filter="${filter}"]`).forEach(b => b.classList.remove("active", "bull-active", "bear-active"));
      btn.classList.add("active");
      if (value === "BULLISH") btn.classList.add("bull-active");
      if (value === "BEARISH") btn.classList.add("bear-active");

      if (filter === "direction") filters.direction = value;
      else if (filter === "grade") filters.grade = value;
      else if (filter === "swept") filters.swept = parseInt(value);
    }
    render();
  });
});

document.getElementById("searchInput").addEventListener("input", e => {
  filters.search = e.target.value;
  render();
});

document.querySelectorAll(".view-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".view-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    viewMode = btn.dataset.view;
    render();
  });
});

// ---- Init ----
loadData();
</script>
</body>
</html>
